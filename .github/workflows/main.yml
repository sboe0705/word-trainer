name: Go CI
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Create zip file
        run: zip -r word-trainer.zip dist/*
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: word-trainer
          path: word-trainer.zip
